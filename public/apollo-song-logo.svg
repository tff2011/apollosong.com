<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&amp;display=swap');
      
      .brand-title {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 500;
        fill: #000000;
        letter-spacing: -0.02em; /* Tighter tracking for elegance */
      }
      
      .brand-accent {
        font-weight: 400;
        fill: #397F8A; /* Teal brand color */
        font-style: italic; /* Adding an elegant italic touch for contrast */
        letter-spacing: 0em;
      }
      
      /* Subtle decorative divider */
      .brand-line {
        stroke: #397F8A;
        stroke-width: 1.5;
        stroke-linecap: round;
        opacity: 0.6;
      }
      
      @media (prefers-color-scheme: dark) {
        .brand-title {
          fill: #000000; /* Stays black per your request */
        }
      }
    </style>
  </defs>

  <!-- Typography Only -->
  <!-- Centered perfectly within the 800x200 canvas -->
  <text x="400" y="130" class="brand-title" font-size="120" text-anchor="middle">
    Apollo<tspan class="brand-accent">Song</tspan>
  </text>
  
  <!-- Subtle elegant underline/accent underneath -->
  <line x1="320" y1="160" x2="480" y2="160" class="brand-line" />
  
  <!-- Small decorative dot in the center of the line -->
  <circle cx="400" cy="160" r="3" fill="#397F8A" opacity="0.8" />
</svg>
